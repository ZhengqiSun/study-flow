<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验流程</title>
<style>
  :root{
    --bg1:#eef2fb; --bg2:#f6f0fb;
    --card:#ffffff;
    --ink:#20232b; --muted:#8a90a0; --line:#eceef4;
    --accent:#5b6ef5; --accent2:#8a7bf0;
    --p1:#2f6fed; --p1bg:#e9f0ff;
    --p2:#7a4fe0; --p2bg:#f1ebff;
    --p0:#5a6072; --p0bg:#eef0f4;
    --box:#f7f8fc;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink); line-height:1.75;
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg2), transparent 60%),
      radial-gradient(1000px 500px at 110% 0%, var(--bg1), transparent 55%),
      #f3f5fb;
    min-height:100%;
    padding:28px 16px 90px;
  }
  .wrap{max-width:680px;margin:0 auto;}

  header{text-align:center;margin-bottom:22px;}
  header h1{
    font-size:22px;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  header .sub{font-size:13px;color:var(--muted);margin-top:6px;}

  .progress{margin:18px 4px 0;}
  .progress-bar{height:9px;background:#e6e9f2;border-radius:999px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .4s cubic-bezier(.4,0,.2,1);}
  .progress-text{font-size:12px;color:var(--muted);text-align:right;margin-top:6px;}

  .card{
    background:var(--card);border-radius:20px;padding:28px 26px;
    box-shadow:0 10px 40px rgba(60,70,120,.10), 0 2px 8px rgba(60,70,120,.05);
    border:1px solid rgba(255,255,255,.6);
    animation:pop .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99);}to{opacity:1;transform:none;}}

  .phase-tag{display:inline-flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;margin-bottom:14px;}
  .phase-tag .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .phase-1{background:var(--p1bg);color:var(--p1);}
  .phase-2{background:var(--p2bg);color:var(--p2);}
  .phase-0{background:var(--p0bg);color:var(--p0);}

  .step-kind{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:3px;}
  .step-title{font-size:19px;font-weight:800;margin-bottom:16px;}

  .content-box{
    background:var(--box);border:1px solid var(--line);border-radius:14px;
    padding:18px;font-size:15.5px;white-space:pre-wrap;word-break:break-word;
    max-height:44vh;overflow-y:auto;color:#2c3040;
  }
  .content-box.link{font-family:ui-monospace,Menlo,monospace;color:var(--p1);
    font-size:15px;word-break:break-all;}

  .note{margin-top:14px;font-size:13.5px;color:#8a6d00;
    background:#fff8e4;border-left:4px solid #f2c14e;
    padding:11px 14px;border-radius:0 8px 8px 0;}

  .btns{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;}
  button{border:none;border-radius:13px;padding:15px 16px;font-size:15px;
    font-weight:700;cursor:pointer;transition:transform .08s,box-shadow .2s,background .2s;
    font-family:inherit;}
  button:active{transform:scale(.96);}
  .btn-copy{flex:1;min-width:120px;background:#eef1f9;color:#3a3f50;}
  .btn-copy:hover{background:#e4e9f7;}
  .btn-copy.done{background:#d8f6e0;color:#128a3c;}
  .btn-open{flex:1;min-width:120px;background:#eaf1ff;color:var(--p1);}
  .btn-open:hover{background:#dde9ff;}
  .btn-next{flex:1.4;min-width:140px;color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    box-shadow:0 6px 18px rgba(91,110,245,.35);}
  .btn-next:hover{box-shadow:0 8px 22px rgba(91,110,245,.45);}
  .btn-next:disabled{background:#c9cdda;color:#fff;box-shadow:none;cursor:not-allowed;}
  .lock-hint{margin-top:12px;font-size:12.5px;color:var(--muted);text-align:center;}

  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding:0 4px;}
  .nav button{background:transparent;color:var(--muted);font-weight:600;
    padding:6px 8px;font-size:13px;border-radius:8px;}
  .nav button:hover{background:rgba(0,0,0,.04);}
  .nav button:disabled{opacity:.3;cursor:default;background:transparent;}

  .done-screen{text-align:center;padding:44px 20px;}
  .done-screen .emoji{font-size:52px;}
  .done-screen h2{margin:16px 0 10px;font-size:22px;}
  .done-screen p{color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>实验流程</h1>
    <div class="sub">请按顺序完成每一步 · 完成后点「下一步」</div>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>
  </header>

  <div id="app"></div>

  <div class="nav">
    <button id="prev" onclick="go(-1)">← 上一步</button>
    <button id="jump" onclick="jumpMenu()">跳转 ▾</button>
  </div>
</div>

let i = 0;
const completed = {};   // 记录每一步是否已完成（点过复制/打开）
const app = document.getElementById('app');
const fill = document.getElementById('fill');
const ptext = document.getElementById('ptext');

function render(){
  if(i >= steps.length){ renderDone(); return; }
  const s = steps[i];
  fill.style.width = (i/steps.length*100) + "%";
  ptext.textContent = `第 ${i+1} / ${steps.length} 步`;
  const isLink = s.type === "link";
  const done = !!completed[i];
  const nextHint = isLink ? "请先点「打开」查看本步内容，才能进入下一步" : "请先点「复制」，才能进入下一步";
  app.innerHTML = `
    <div class="card" id="card">
      <span class="phase-tag phase-${s.phase}"><span class="dot"></span>${s.label}</span>
      <div class="step-kind">${escapeHtml(s.kind)}</div>
      <div class="step-title">${escapeHtml(s.title)}</div>
      <div class="content-box ${isLink?'link':''}">${escapeHtml(s.content)}</div>
      ${s.note ? `<div class="note">💡 ${escapeHtml(s.note)}</div>` : ``}
      <div class="btns">
        <button class="btn-copy" id="copyBtn" onclick="copyNow()">📋 复制</button>
        ${isLink ? `<button class="btn-open" onclick="openLink()">🔗 打开</button>` : ``}
        <button class="btn-next" id="nextBtn" onclick="go(1)" ${done?'':'disabled'}>下一步 →</button>
      </div>
      ${done ? `` : `<div class="lock-hint">🔒 ${nextHint}</div>`}
    </div>`;
  document.getElementById('prev').disabled = (i === 0);
}

function unlockNext(){
  completed[i] = true;
  const btn = document.getElementById('nextBtn');
  if(btn) btn.disabled = false;
  const hint = document.querySelector('.lock-hint');
  if(hint) hint.remove();
}

function renderDone(){
  fill.style.width = "100%";
  ptext.textContent = `全部 ${steps.length} 步已完成`;
  app.innerHTML = `
    <div class="card done-screen">
      <div class="emoji">🎉</div>
      <h2>全部完成</h2>
      <p>感谢你的参与！请等待实验员进行后续说明。</p>
      <div class="btns"><button class="btn-next" onclick="i=0;render()">← 回到开头</button></div>
    </div>`;
  document.getElementById('prev').disabled = false;
}

function go(d){ i += d; if(i<0) i=0; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function copyNow(){
  const text = steps[i].content;
  const done = ()=>{ unlockNext(); const b=document.getElementById('copyBtn'); b.textContent="✅ 已复制"; b.classList.add('done');
    setTimeout(()=>{b.textContent="📋 复制";b.classList.remove('done');},1500); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else fallback();
  function fallback(){ const ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta); done(); }
}

function openLink(){ unlockNext(); window.open(steps[i].content,'_blank'); }

function jumpMenu(){
  const list = steps.map((s,idx)=>`${idx+1}. ${s.label} · ${s.kind}`).join("\n");
  const ans = prompt("跳转到第几步？（1-"+steps.length+"）\n\n"+list, i+1);
  if(ans===null) return;
  const n = parseInt(ans,10);
  if(!isNaN(n)&&n>=1&&n<=steps.length){ i=n-1; render(); }
}

function escapeHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

render();
</script>
